# Default values — override per service in helm/values/{service}.yaml
service:
  name: ""
  namespace: aicares

image:
  repository: ""
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8080

resources:
  limits:
    memory: "200Mi"
  requests:
    memory: "64Mi"
    cpu: "50m"

env: []
# - name: FOO
#   value: "bar"

serviceType: ClusterIP

nodeSelector: {}

livenessProbe: {}
readinessProbe: {}
