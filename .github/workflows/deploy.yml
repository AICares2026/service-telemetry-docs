name: Deploy to EKS

on:
  push:
    branches: [main]

env:
  ECR_REGISTRY: 952893849914.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: aicares-application
  AWS_REGION: us-east-1
  CLUSTER_NAME: aiops-agent-demo-cluster
  NAMESPACE: aicares
  SERVICE_NAME: telemetry-docs

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -f Dockerfile \
            --build-arg BUILDPLATFORM=linux/amd64 \
            --build-arg TARGETARCH=amd64 \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Delete conflicting resources
        run: |
          kubectl delete deployment service-${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }} --ignore-not-found
          kubectl delete service    service-${{ env.SERVICE_NAME }} -n ${{ env.NAMESPACE }} --ignore-not-found

      - name: Deploy
        run: |
          helm upgrade --install service-${{ env.SERVICE_NAME }} ./helm/service-chart \
            --namespace ${{ env.NAMESPACE }} \
            --values ./helm/values.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m
